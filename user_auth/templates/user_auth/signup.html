{% load static %}

<!doctype HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- viewport meta -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="DigiPro - Digital Products Marketplace ">
    <meta name="keywords" content="marketplace, easy digital download, digital product, digital, html5">
    <title>CS - Register</title>

    <link href="https://fonts.googleapis.com/css?family=Work+Sans:400,500,600" rel="stylesheet">

    <!-- inject:css-->

    <link rel="stylesheet" href="{% static 'css/plugin.min.css' %}">

    <link rel="stylesheet" href="{% static 'style.css' %}">

    <!-- endinject -->

    <!-- Favicon Icon -->
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-32x32.png">
</head>
<body class="preload">


     
    
    <!-- Breadcrumb Area -->
    <section class="breadcrumb-area">
        <div class="container">
            <div class="row">
                <div class="col-md-12">
                    <div class="breadcrumb-contents">
                        <h2 class="page-title">Student Signup</h2>
                        <div class="breadcrumb">
                            <ul>
                                <li>
                                    <a href="/">Home</a>
                                </li>
                                <li class="active">
                                    <a href="#">Signup</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div><!-- end .col-md-12 -->
            </div><!-- end .row -->
        </div><!-- end .container -->
    </section><!-- ends: .breadcrumb-area -->


    <section class="signup_area section--padding">
        <div class="container">
            <div class="row">
                <div class="col-lg-6 offset-lg-3">
                    <form action="" method="post">
                        {% csrf_token %}
                        {% include 'message.html' %}
                        <div class="cardify signup_form">
                            <div class="login--header">
                                <h3>Create Your Account</h3>
                                <p>Please fill the following fields with appropriate information to register a new Computer Science Student Account.
                                </p>
                            </div><!-- end .login_header -->

                            <div class="login--form">
                                <div class="form-group">
                                    <label for="urname">First Name</label>
                                    <input id="urname" name="first_name" type="text" class="text_field" placeholder="Enter your First Name" required>
                                </div>
                                <div class="form-group">
                                    <label for="urname">Last Name</label>
                                    <input id="urname" name="last_name" type="text" class="text_field" placeholder="Enter your Last Name" required>
                                </div>

                                <div class="form-group">
                                    <label for="email_ad">Email Address</label>
                                    <input id="email_ad" name="email" type="email" class="text_field" placeholder="Enter your email address" required>
                                    
                                </div>

                                <div class="form-group">
                                    <label for="user_name">Reg. Number</label>
                                    <input id="user_name" name="regno" type="text" class="text_field" placeholder="Enter your Registration Number">
                                </div>

                                <div class="form-group">
                                    <label for="password">Password</label>
                                    <input id="password" name="password1" type="password" class="text_field" placeholder="Enter your password...">
                                </div>

                                <div class="form-group">
                                    <label for="con_pass">Confirm Password</label>
                                    <input id="con_pass" name="password2" type="password" class="text_field" placeholder="Confirm password">
                                </div>

                                <button class="btn btn--md register_btn btn-primary" type="submit">Register Now</button>

                                <div class="login_assist">
                                    <p>Already have an account?
                                        <a href="{% url 'login' %}">Login</a>
                                    </p>
                                </div>
                            </div><!-- end .login--form -->
                        </div><!-- end .cardify -->
                    </form>
                </div><!-- end .col-md-6 -->
            </div><!-- end .row -->
        </div><!-- end .container -->
    </section><!-- ends: .signup_area -->



     
     
 


    <script src="http://maps.googleapis.com/maps/api/js?key=AIzaSyDxflHHc5FlDVI-J71pO7hM1QJNW1dRp4U"></script>
    <!-- inject:js-->

     <script src="{% static 'js/plugins.min.js' %}"></script>

     <script src="{% static 'js/script.min.js' %}"></script>

     <!-- endinject-->
</body>
</html>
