{% extends 'nav.html' %}
{% load static %}
    <!-- header banner -->


{% block title %}
    IMT - Computer Science
{% endblock title %}
    
    
    {% block content %}


    <!-- BREADCRUMB AREA -->
    <section class="rts-breadcrumb breadcrumb-height breadcumb-bg" style="background-image: url({% static 'assets/images/banner/breadcrumb.jpg' %});">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <div class="breadcrumb-content">
                        <ul class="breadcrumb">
                            <li class="breadcrumb-item"><a href="/">Home</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Leaders</li>
                        </ul>
                        <h2 class="section-title">Department Student Leaders</h2>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- BREADCRUMB AREA END -->


    <!-- faculty directory -->
    <section class="rts-faculty rts-section-padding">
        <div class="container">
            <div class="row justify-content-md-center">
                <div class="col-lg-12 col-md-11 d-flex flex-wrap gap-5 justify-content-between align-items-start mb--60 border-bottom pb-5">
                    <div class="rts-section text-center">
                        <h3 class="rts-section-title text-center">All the Student Leaders</h3>
                    </div>
                    
                </div>
            </div>
            <div class="row g-5">
                <!-- single item -->
                
                {% for person in excos %}
                    <div class="col-lg-3 col-md-4 col-sm-6">
                        <div class="single-cat-item">
                            <div class="cat-thumb" style="max-height: 250px; overflow: hidden;">
                                <a href="{{person.image.url}}" class="nav-link">
                                    <img src="{{person.image.url}}" alt="course-thumbnail">
                                </a>
                            </div>
                            <div class="cat-meta">
                                <div class="cat-title fw-bold">
                                    Comr. {{person.name}}
                                </div>
                                <small>{{person.position}}</small>
                            </div>

                        </div>
                    </div>
                {% endfor %}
                    
                

            </div>

        </div>
    </section>
    <!-- faculty directory end -->


{% endblock %}
